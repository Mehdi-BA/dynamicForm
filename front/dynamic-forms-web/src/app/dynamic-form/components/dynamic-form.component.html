<!--
  Que les champs : ni <form>, ni carte, ni bouton. C'est l'application appelante qui les
  porte, et qui pilote la validation et l'envoi.
-->
<div class="df-grid" [formGroup]="form()">
  @for (field of schema().fields; track field.name) {
    <app-dynamic-field
      [field]="field"
      [dataSources]="schema().dataSources ?? []"
      [parent]="form()"
      [rootForm]="form()"
      [style.grid-column]="'span ' + (field.cols ?? 12)" />
  }
</div>

@if (debug()) {
  <mat-card appearance="outlined" class="df-debug">
    <mat-card-header>
      <mat-card-title class="df-debug__title">
        <mat-icon inline>data_object</mat-icon>
        Valeur du formulaire
        <span class="df-debug__status" [class.df-debug__status--invalid]="form().invalid">
          {{ form().invalid ? 'invalide' : 'valide' }}
        </span>
      </mat-card-title>
      <mat-card-subtitle>
        Les champs masqués sont désactivés : ils n'apparaissent pas ici.
      </mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <pre class="df-debug__json">{{ currentValue() | json }}</pre>
    </mat-card-content>
  </mat-card>
}
